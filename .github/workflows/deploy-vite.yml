name: Deploy to Pages

on:
  push:
      branches: [main]
        workflow_dispatch:

        permissions:
          contents: write
            pages: write
              id-token: write

              concurrency:
                group: pages
                  cancel-in-progress: false

                  jobs:
                    build:
                        runs-on: ubuntu-latest
                            steps:
                                  - name: Checkout
                                          uses: actions/checkout@v4

                                                - name: Setup Node
                                                        uses: actions/setup-node@v4
                                                                with:
                                                                          node-version: 18

                                                                                - name: Install dependencies
                                                                                        run: npm ci

                                                                                              - name: Build
                                                                                                      run: npm run build
                                                                                                      
                                                                                                            - name: Copy dist to root
                                                                                                                    run: |
                                                                                                                              cp -r dist/* .
                                                                                                                                        rm -rf dist
                                                                                                                                        
                                                                                                                                              - name: Commit changes
                                                                                                                                                      run: |
                                                                                                                                                                git config user.name "github-actions"
                                                                                                                                                                          git config user.email "github-actions@github.com"
                                                                                                                                                                                    git add -A
                                                                                                                                                                                              git commit -m "chore: deploy build" || echo "No changes to commit"
                                                                                                                                                                                                        git push --force
                                                                                                                                                                                                        
